name: Sync Blog Posts

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull latest blog posts into README
        uses: gautamkrishnar/blog-post-workflow@master
        with:
          feed_list: "https://blog.xinghenluyus.cn/atom.xml"
          max_post_count: 8
          readme_path: README.md
          comment_tag_name: BLOG-POST-LIST
name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      # 🈷️ Languages activity (仓库语言统计)
      - name: Indepth analysis (Languages)
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics/languages.indepth.svg
          # 注意：默认 Token 只能读取受限数据。要统计你账号下所有仓库，必须配置 METRICS_TOKEN
          token: ${{ secrets.METRICS_TOKEN }}
          user: xinghenLuyus
          # 配置你的 Git 提交名称和邮箱，否则统计不到你的代码
          commits_authoring: xinghenLuyus, Luyus, 2593026969@qq.com
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: >-
            html, css, tex, less, dockerfile, makefile, qmake, lex, cmake, shell,
            gnuplot
          plugin_languages_indepth: yes
          plugin_languages_details: lines, bytes-size
          plugin_languages_limit: 4
          plugin_languages_analysis_timeout: 15

      # 🎟️ Follow-up of issues and pull requests (Issue/PR统计)
      - name: Indepth analysis (Follow-up)
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics/followup.indepth.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: xinghenLuyus
          base: ""
          plugin_followup: yes
          plugin_followup_indepth: yes